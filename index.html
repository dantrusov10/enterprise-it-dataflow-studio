<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enterprise Dataflow Editor v4</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: #f1f5f9; color: #0f172a; }
    .app { height: 100vh; position: relative; }
    .sidebar {
      position: absolute; left: 12px; top: 12px; bottom: 12px; width: 260px; z-index: 90;
      background: rgba(255,255,255,0.96); border: 1px solid #cbd5e1; border-radius: 12px; overflow: auto;
      box-shadow: 0 10px 30px rgba(15,23,42,0.12); transition: width .2s ease;
    }
    .sidebar.collapsed { width: 54px; overflow: hidden; }
    .sidebar-head { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #e2e8f0; }
    .sidebar-title { font-size: 13px; font-weight: 700; white-space: nowrap; }
    .sidebar.collapsed .sidebar-title { display: none; }
    .sidebar-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .sidebar.collapsed .sidebar-body { display: none; }
    .sidebar .btn { width: 100%; text-align: left; }
    .sidebar-search-section { border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 4px; }
    .sidebar-search-section h3 { margin: 0 0 6px 0; font-size: 12px; font-weight: 700; color: #0f172a; }
    .sidebar-search-results { max-height: 240px; overflow-y: auto; margin-top: 6px; font-size: 11px; }
    .sidebar-search-results h4 { margin: 6px 0 4px 0; font-size: 11px; }
    .btn { border: 1px solid #94a3b8; background: #fff; border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 13px; }
    .btn:hover { background: #f8fafc; }
    .btn.active { background: #0f172a; color: #fff; border-color: #0f172a; }
    .badge { font-size: 12px; color: #334155; background: #dbeafe; border: 1px solid #93c5fd; padding: 3px 8px; border-radius: 999px; }
    /* Полная высота: иначе при absolute-вьюпорте родитель схлопывается в 0 и паутина не видна */
    .workspace-wrap { position: absolute; inset: 0; overflow: hidden; }
    #workspace {
      position: relative; width: 2600px; height: 1600px; margin: 0; background: #f8fafc;
      background-image:
        linear-gradient(to right, rgba(15,23,42,0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(15,23,42,0.04) 1px, transparent 1px);
      background-size: 24px 24px;
      transform-origin: top left;
    }
    #viewport { position: absolute; inset: 0; overflow: auto; }
    /* SVG между зонами и узлами: клик по стрелке не перехватывается фоном зоны */
    #edges { position: absolute; inset: 0; overflow: visible; z-index: 15; pointer-events: none; }
    .zone {
      position: absolute; border: 2px solid; border-radius: 12px; background: rgba(255,255,255,0.5);
      box-sizing: border-box; z-index: 10;
    }
    .zone-resize {
      position: absolute;
      width: 12px;
      height: 12px;
      right: 4px;
      bottom: 4px;
      border-radius: 2px;
      background: rgba(15,23,42,0.75);
      border: 1px solid #fff;
      cursor: nwse-resize;
      pointer-events: all;
    }
    .zone-header {
      position: absolute; top: 6px; left: 10px; right: 10px; font-size: 12px; font-weight: 700; text-align: center;
      pointer-events: none;
    }
    .node {
      position: absolute; min-width: 110px; padding: 5px 8px; font-size: 12px; text-align: center;
      border: 1.5px solid #64748b; border-radius: 0; background: #fff; cursor: pointer; user-select: none;
      box-sizing: border-box; z-index: 20;
    }
    .node.hub {
      width: 120px; height: 120px; border-radius: 999px; border: 3px solid #0f172a; background: #0f172a; color: #fff;
      display: flex; align-items: center; justify-content: center; font-weight: 700; line-height: 1.2;
    }
    .selected { box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.35); }
    .muted { opacity: 0.18; filter: grayscale(35%); }
    .edge-path { fill: none; stroke-width: 2.2; pointer-events: stroke; cursor: pointer; }
    .edge-hit { fill: none; stroke: transparent; stroke-width: 16; pointer-events: stroke; cursor: pointer; }
    .edge-label { font-size: 11px; fill: #7e22ce; user-select: none; pointer-events: none; }
    .edge-direct { stroke: #111827; }
    .edge-alt { stroke: #475569; stroke-dasharray: 4 4; }
    .edge-zone { stroke: #16a34a; }
    .edge-active { stroke: #0f172a !important; stroke-width: 3.2 !important; }
    .control-point { fill: #2563eb; stroke: #fff; stroke-width: 1.5; cursor: move; pointer-events: all; }
    .modal-backdrop {
      position: absolute; inset: 0; z-index: 120; background: rgba(2, 6, 23, 0.45); backdrop-filter: blur(4px);
      display: none;
    }
    .modal-backdrop.open { display: block; }
    .knowledge-modal {
      position: absolute; z-index: 130; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: min(880px, calc(100vw - 60px)); max-height: calc(100vh - 80px); display: none;
      background: #fff; border: 1px solid #cbd5e1; border-radius: 12px; box-shadow: 0 20px 60px rgba(15,23,42,0.28);
      overflow: hidden;
    }
    .knowledge-modal.open { display: block; }
    .knowledge-modal-body { max-height: calc(100vh - 150px); overflow: auto; padding: 12px; }
    .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .icon-btn { border: 1px solid #94a3b8; background: #fff; border-radius: 8px; padding: 2px 8px; cursor: pointer; font-size: 12px; }
    .fab-knowledge {
      position: absolute; right: 14px; bottom: 14px; z-index: 95;
      border: 1px solid #1d4ed8; background: #1d4ed8; color: #fff; border-radius: 999px; padding: 8px 14px; cursor: pointer;
      box-shadow: 0 8px 20px rgba(29,78,216,0.35); font-size: 12px;
    }
    .panel h4 { margin: 0 0 8px 0; font-size: 13px; }
    .hint { color: #475569; margin-top: 8px; line-height: 1.35; }
    .search-input { width: 100%; box-sizing: border-box; border: 1px solid #94a3b8; border-radius: 8px; padding: 6px 8px; font-size: 12px; }
    .panel-section { margin-top: 10px; border-top: 1px solid #e2e8f0; padding-top: 8px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; margin-right: 4px; margin-bottom: 4px; background: #e2e8f0; color: #0f172a; }
    .result-item { border: 1px solid #cbd5e1; border-radius: 8px; padding: 6px; margin: 6px 0; cursor: pointer; background: #fff; }
    .result-item:hover { background: #f8fafc; }
    .muted-text { color: #64748b; font-size: 11px; }
    .detail-prompt {
      position: fixed; left: 50%; bottom: 56px; transform: translateX(-50%); z-index: 100;
      display: none; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center;
      max-width: min(520px, calc(100vw - 40px));
      padding: 8px 12px; background: rgba(255,255,255,0.97); border: 1px solid #94a3b8; border-radius: 10px;
      box-shadow: 0 8px 24px rgba(15,23,42,0.15); font-size: 12px;
    }
    .detail-prompt.visible { display: flex; }
    .detail-prompt .detail-prompt-label { font-weight: 600; color: #0f172a; }
    .detail-prompt .btn-tiny { padding: 4px 12px; font-size: 12px; border-radius: 6px; cursor: pointer; border: 1px solid #64748b; background: #fff; }
    .detail-prompt .btn-tiny.primary { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <span class="sidebar-title">Меню</span>
        <button class="icon-btn" id="toggleSidebarBtn">⟨</button>
      </div>
      <div class="sidebar-body">
        <div class="sidebar-search-section">
          <h3>Поиск по базе</h3>
          <input id="sidebarSearchInput" class="search-input" type="search" placeholder="Задача, функция, синоним…" autocomplete="off" />
          <div class="hint" style="font-size:11px;margin-top:4px;">Семантика v2. В карточке класса раскрывайте функцию — полный текст и заготовка под вендоров. Связи: текст из справочника и листов + опционально corpus.</div>
          <div id="sidebarSearchResults" class="sidebar-search-results"></div>
        </div>
        <button class="btn" id="editToggle">Редактировать: выкл</button>
        <button class="btn" id="addZoneBtn">+ Зона</button>
        <button class="btn" id="addClassBtn">+ Класс</button>
        <button class="btn" id="addEdgeBtn">+ Связь</button>
        <button class="btn" id="fitBtn">Подогнать в окно</button>
        <button class="btn" id="resetBtn">Сброс вида</button>
        <button class="btn" id="layoutBtn">Авто-раскладка</button>
        <button class="btn" id="untangleBtn">Упростить связи</button>
        <button class="btn" id="minCrossBtn">Минимум пересечений</button>
        <button class="btn" id="exportBtn">Экспорт JSON</button>
        <button class="btn" id="openKnowledgeBtn">База знаний</button>
        <span class="badge">v5.2.1 fix diagram script parse</span>
      </div>
    </aside>
    <div class="workspace-wrap">
      <div id="viewport">
        <div id="workspace">
          <svg id="edges"></svg>
        </div>
      </div>
      <button class="fab-knowledge" id="openKnowledgeFab">База знаний</button>
      <div class="detail-prompt" id="detailPrompt" aria-live="polite">
        <span class="detail-prompt-label">Подробнее в базе знаний?</span>
        <button type="button" class="btn-tiny primary" id="detailYes">Да</button>
        <button type="button" class="btn-tiny" id="detailNo">Нет</button>
      </div>
      <div class="modal-backdrop" id="knowledgeBackdrop"></div>
      <div class="knowledge-modal" id="infoPanel">
        <div class="panel-head">
          <h4>База знаний</h4>
          <button class="icon-btn" id="closeKnowledgeBtn">✕</button>
        </div>
        <div class="knowledge-modal-body">
          <div id="entityCard" class="panel-section" style="border-top:none;padding-top:0;"></div>
          <div id="vendorCard" class="panel-section"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="./enterprise-it-dataflow-knowledge.js"></script>
  <script>
    const viewport = document.getElementById("viewport");
    const workspace = document.getElementById("workspace");
    const edgesSvg = document.getElementById("edges");
    const sidebar = document.getElementById("sidebar");
    const toggleSidebarBtn = document.getElementById("toggleSidebarBtn");
    const openKnowledgeBtn = document.getElementById("openKnowledgeBtn");
    const openKnowledgeFab = document.getElementById("openKnowledgeFab");
    const knowledgeBackdrop = document.getElementById("knowledgeBackdrop");
    const editToggle = document.getElementById("editToggle");
    const addZoneBtn = document.getElementById("addZoneBtn");
    const addClassBtn = document.getElementById("addClassBtn");
    const addEdgeBtn = document.getElementById("addEdgeBtn");
    const fitBtn = document.getElementById("fitBtn");
    const resetBtn = document.getElementById("resetBtn");
    const layoutBtn = document.getElementById("layoutBtn");
    const untangleBtn = document.getElementById("untangleBtn");
    const minCrossBtn = document.getElementById("minCrossBtn");
    const exportBtn = document.getElementById("exportBtn");
    const infoPanel = document.getElementById("infoPanel");
    const closeKnowledgeBtn = document.getElementById("closeKnowledgeBtn");
    const sidebarSearchInput = document.getElementById("sidebarSearchInput");
    const sidebarSearchResults = document.getElementById("sidebarSearchResults");
    const entityCard = document.getElementById("entityCard");
    const vendorCard = document.getElementById("vendorCard");
    const detailPrompt = document.getElementById("detailPrompt");
    const detailYes = document.getElementById("detailYes");
    const detailNo = document.getElementById("detailNo");

    let editMode = false;
    let scale = 1;
    let selectedEdgeId = null;
    let selectedNodeId = null;
    let selectedZoneId = null;
    let createEdgeMode = false;
    let edgeFrom = null;
    let sidebarCollapsed = false;
    let knowledgeOpen = false;
    /** После «Нет» скрываем запрос, пока не сменится выделение или не кликнут пустое место */
    let detailDismissedToken = "";
    /** После «Да» / открытия базы из меню — не показывать плашку снова при том же выделении */
    let promptSuppressedForToken = "";
    /** В карточке класса: показать полное дерево функций */
    let classDetailExpanded = false;

    function esc(s) {
      return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");
    }

    function selectionDetailToken() {
      if (selectedEdgeId) return "e:" + selectedEdgeId;
      if (selectedNodeId) return "n:" + selectedNodeId;
      if (selectedZoneId) return "z:" + selectedZoneId;
      return "";
    }

    function updateDetailPrompt() {
      const tok = selectionDetailToken();
      if (!tok) {
        detailPrompt.classList.remove("visible");
        return;
      }
      if (tok === detailDismissedToken || tok === promptSuppressedForToken) {
        detailPrompt.classList.remove("visible");
        return;
      }
      detailPrompt.classList.add("visible");
    }

    function syncPromptSuppressionForNewSelection() {
      const tok = selectionDetailToken();
      if (promptSuppressedForToken && promptSuppressedForToken !== tok) promptSuppressedForToken = "";
    }

    function endpointTitlePlain(id) {
      if (id.startsWith("z-")) return zoneById(id)?.title || id;
      return nodeById(id)?.label?.replace(/\n/g, " ") || id;
    }

    function truncateText(s, max) {
      const t = String(s ?? "").replace(/\s+/g, " ").trim();
      if (!t) return "";
      if (t.length <= max) return t;
      return t.slice(0, max).trim() + "…";
    }

    function pickRelevantFunctions(sheetData, hintText, limit) {
      const funcs = listFromValue(sheetData?.allFunctions?.length ? sheetData.allFunctions : sheetData?.topFunctions);
      const hints = tokenizeQuery(hintText);
      const expanded = expandQueryTokens(hints);
      const scored = [];
      for (const f of funcs) {
        if (String(f.type || "").toLowerCase().includes("категор")) continue;
        const blob = normalizeForMatch(`${f.title || ""} ${f.general || ""} ${f.technical || ""} ${f.business || ""}`);
        let score = 0;
        for (const t of expanded) {
          if (t.length < 3) continue;
          if (blob.includes(t)) score += 2;
        }
        for (const t of hints) {
          if (t.length >= 4 && blob.includes(t)) score += 4;
        }
        if (score > 0) scored.push({ f, score });
      }
      scored.sort((a, b) => b.score - a.score);
      if (scored.length) return scored.slice(0, limit).map((x) => x.f);
      const fallback = listFromValue(sheetData?.allFunctions?.length ? sheetData.allFunctions : sheetData?.topFunctions)
        .filter((f) => !String(f.type || "").toLowerCase().includes("категор"));
      return [...fallback].sort((a, b) => (b.priority || 0) - (a.priority || 0)).slice(0, limit);
    }

    function endpointKbBundle(endpointId) {
      if (endpointId.startsWith("z-")) {
        const z = zoneById(endpointId);
        const kb = zoneKbById(endpointId);
        const title = z?.title || endpointId;
        const ref = kb
          ? { what: kb.what, techGoal: kb.techGoal, businessGoal: kb.businessGoal, howWorks: kb.howWorks }
          : null;
        return { title, ref, sheet: null };
      }
      const node = nodeById(endpointId);
      const title = node?.label?.replace(/\n/g, " ") || endpointId;
      const cref = classRefByNode(node);
      const sh = classSheetByNode(node);
      return { title, ref: cref?.data || null, sheet: sh?.data || null };
    }

    function formatFunctionBullets(funcs, maxLen) {
      return funcs
        .map((f) => {
          const title = (f.title || "").trim();
          const body = truncateText(f.general || f.technical || f.business || "", maxLen);
          if (!title && !body) return "";
          return body ? `«${title}» — ${body}` : `«${title}»`;
        })
        .filter(Boolean);
    }

    function buildEdgeKnowledgeSections(e) {
      if (e.kb && typeof e.kb === "object") {
        const k = e.kb;
        return {
          what: k.what || "",
          why: k.why || "",
          atSource: k.atSource || "",
          atDest: k.atDest || "",
          research: k.research || ""
        };
      }
      const fromB = endpointKbBundle(e.from);
      const toB = endpointKbBundle(e.to);
      const fromT = fromB.title;
      const toT = toB.title;
      const label = (e.label || "").trim();
      const hint = [label, fromT, toT].filter(Boolean).join(" ");

      const typeRu =
        e.type === "zone"
          ? "логическая связь уровня зон: агрегированный поток между крупными блоками архитектуры."
          : e.type === "alt"
            ? "связь-оговорка: акцент на отличии ролей или риске путаницы, не обязательно ежедневный обмен."
            : "операционная интеграция: регулярный или событийный обмен между классами.";

      const fromWhat = truncateText(fromB.ref?.what || "", 360);
      const toWhat = truncateText(toB.ref?.what || "", 360);
      const fromHow = truncateText(fromB.ref?.howWorks || "", 420);
      const toHow = truncateText(toB.ref?.howWorks || "", 420);
      const fromBiz = truncateText(fromB.ref?.businessGoal || "", 280);
      const toBiz = truncateText(toB.ref?.businessGoal || "", 280);
      const fromTech = truncateText(fromB.ref?.techGoal || "", 220);
      const toTech = truncateText(toB.ref?.techGoal || "", 220);

      let what = "";
      if (label) {
        what = `Подпись на схеме — «${label}»: так зафиксирован смысл передаваемых артефактов или событий из «${fromT}» в «${toT}». `;
      } else {
        what = `Связь соединяет «${fromT}» и «${toT}». Состав обмена следует из объектов учёта, API и процессов этих классов (ниже — выдержки из материалов базы). `;
      }
      if (fromWhat) what += `Источник («${fromT}»): ${fromWhat} `;
      if (toWhat) what += `Приёмник («${toT}»): ${toWhat}`;

      let why = "";
      if (fromBiz || toBiz || fromTech || toTech) {
        why = `Смысл связи в архитектуре: `;
        if (fromBiz) why += `со стороны «${fromT}» — ${fromBiz} `;
        if (toBiz) why += `со стороны «${toT}» — ${toBiz} `;
        if (fromTech || toTech) {
          why += `Технические акценты: `;
          if (fromTech) why += `(${fromT}) ${fromTech} `;
          if (toTech) why += `(${toT}) ${toTech} `;
        }
        why += `Тип на схеме: ${typeRu}`;
      } else {
        why = `Связь позволяет «${toT}» опираться на факты и контекст из «${fromT}» без дублирования учёта и расхождений. ${typeRu}`;
      }

      const relFrom = pickRelevantFunctions(fromB.sheet, hint, 4);
      const relTo = pickRelevantFunctions(toB.sheet, hint, 4);
      const bulletsFrom = formatFunctionBullets(relFrom, 220);
      const bulletsTo = formatFunctionBullets(relTo, 220);

      let atSource = "";
      if (fromHow) atSource = `${fromHow} `;
      if (bulletsFrom.length) {
        atSource += `Фрагменты из листа функций «${fromT}», близкие к подписи связи: ${bulletsFrom.map((b) => b).join(" · ")}`;
      } else if (!fromHow) {
        atSource = `В «${fromT}» данные формируются штатной работой класса (сбор, API, журналы, справочники) — в материалах нет отдельного листа или совпадений по ключевым словам подписи.`;
      }

      let atDest = "";
      if (toHow) atDest = `${toHow} `;
      if (bulletsTo.length) {
        atDest += `Фрагменты из листа «${toT}», релевантные потоку: ${bulletsTo.map((b) => b).join(" · ")}`;
      } else if (!toHow) {
        atDest = `«${toT}» потребляет поток в рамках своих процессов (workflow, реестры, отчётность, события) — уточните подпись на стрелке или расширьте материалы класса.`;
      }

      const researchParts = [];
      for (const f of relFrom.slice(0, 2)) {
        const g = truncateText(f.general || f.technical || "", 300);
        if (g) researchParts.push(`[${fromT}] ${f.title}: ${g}`);
      }
      for (const f of relTo.slice(0, 2)) {
        const g = truncateText(f.general || f.technical || "", 300);
        if (g) researchParts.push(`[${toT}] ${f.title}: ${g}`);
      }
      let research = researchParts.length
        ? researchParts.join("\n\n")
        : `Расширенные выдержки из CSV-исследования по этой паре собираются автоматически из листов классов (поля general/technical) по подписи «${label || "—"}» и названиям концов. При необходимости добавьте в корень репозитория файл enterprise-it-research-corpus.txt и пересоберите базу — в карточку связи подтянутся релевантные абзацы полного исследования.`;

      return { what: what.trim(), why: why.trim(), atSource: atSource.trim(), atDest: atDest.trim(), research: research.trim() };
    }
    const KB = window.ENTERPRISE_KB || { zones: {}, classReference: {}, classSheets: {}, researchCorpus: "" };

    const RU_STEM_SUFFIXES = [
      "иями","ями","остями","ях","ах","ами","ого","ему","ому","ыми","ех","ох","им","ым","ую","юю","ых","их","ая","ое","ые","ий","ой","ей","ем","ам","ям","ию","ия","ие","ов","ев","ть","ся","сь","ла","ли","ло","на","но","ны","ет","ют","ат","ят","ить","ать","ение","ения","ости","ания","ован","ирован","ельн","ество","нн","лись"
    ];

    const THESAURUS_GROUPS = [
      ["инцидент","инциденты","incident","outage","авария","сбой","простой","тикет","ticket","обращение","дежурство","major","p1","эскалац"],
      ["лиценз","license","licence","sam","entitlement","елп","elp","true-up","trueup","комплаенс лиценз"],
      ["дискавери","discovery","инвентаризац","inventory","сканир","обнаружен","снмп","snmp","агент","wmi","ssh"],
      ["безопасн","security","siem","edr","угроз","vulnerab","уязвим","grc","кибер","soc","pam","dlp","форензик"],
      ["изменен","change","релиз","release","деплой","deployment","патч","patch","конфигур","drift","rollout"],
      ["актив","asset","itam","cmdb","ci","golden","золот","оборудован","hw","издел"],
      ["доступ","access","iam","iga","идентич","роль","провижин","provision","joiner","mover","leaver","sso"],
      ["монитор","monitor","наблюдаем","observability","алерт","метрик","apm","лог","trace","telemet"],
      ["финанс","finops","стоимост","tco","roi","бюджет","chargeback","закуп","erp","капекс","списан"],
      ["облак","cloud","kubernetes","k8s","контейнер","vpc","s3","bucket","мультиоблак"],
      ["itsm","сервис деск","service desk","заявк","каталог услуг","service catalog","sla"],
      ["нормализ","dedup","дедуп","сопостав","reconcil","сигнатур","recognition","дедуплик"],

    function nrm(value) {
      return String(value || "").toLowerCase().replace(/\s+/g, " ").trim();
    }

    function prepSearch(s) {
      return nrm(String(s || "").replace(/ё/g, "е"));
    }

    function stemToken(tok) {
      let w = prepSearch(tok).replace(/[^a-z0-9а-яіїєґ]+/gi, "");
      if (w.length < 4) return w;
      for (const suf of RU_STEM_SUFFIXES) {
        if (w.length > suf.length + 3 && w.endsWith(suf)) return w.slice(0, -suf.length);
      }
      if (w.length > 5 && /(и|ы|а|я|о|е|й|ь|ю)$/.test(w)) w = w.slice(0, -1);
      return w;
    }

    function tokenizeQuery(q) {
      return prepSearch(q).split(/[^a-z0-9а-яіїєґ]+/i).filter((t) => t.length >= 2);
    }

    function expandQueryTokens(rawTokens) {
      const set = new Set();
      for (const raw of rawTokens) {
        const p = prepSearch(raw);
        if (!p) continue;
        set.add(p);
        set.add(stemToken(p));
        if (/[a-z]/.test(p)) {
          const e = p.replace(/(ing|ed|es|s)$/i, "");
          if (e.length > 2) set.add(e);
        }
        for (const g of THESAURUS_GROUPS) {
          const hit = g.some((x) => {
            const nx = prepSearch(x);
            if (!nx || nx.length < 2) return false;
            return p.includes(nx) || nx.includes(p) || stemToken(p) === stemToken(nx) ||
              stemToken(p).includes(stemToken(nx)) || stemToken(nx).includes(stemToken(p));
          });
          if (hit) g.forEach((x) => { const nx = prepSearch(x); if (nx) { set.add(nx); set.add(stemToken(nx)); } });
        }
      }
      return [...set].filter((t) => t && t.length >= 2);
    }

    function normalizeForMatch(s) {
      return prepSearch(s).replace(/\s+/g, " ");
    }

    function listFromValue(v) {
      if (!v) return [];
      if (Array.isArray(v)) return v;
      return [v];
    }

    function enrichEdgeResearch(baseResearch, hint) {
      const corpus = KB.researchCorpus;
      if (!corpus || typeof corpus !== "string" || corpus.length < 200) return baseResearch;
      const paras = corpus.split(/\n\s*\n/).map((p) => p.trim()).filter((p) => p.length > 100);
      const toks = expandQueryTokens(tokenizeQuery(hint)).filter((t) => t.length > 3);
      if (!toks.length) return baseResearch;
      const scored = [];
      for (const p of paras) {
        const np = normalizeForMatch(p);
        let hits = 0;
        for (const t of toks) if (np.includes(t)) hits++;
        if (hits) scored.push({ p, hits });
      }
      scored.sort((a, b) => b.hits - a.hits);
      const top = scored.slice(0, 2).map((x) => truncateText(x.p, 520));
      if (!top.length) return baseResearch;
      return `${baseResearch}\n\n— Полное исследование (релевантные абзацы):\n\n${top.join("\n\n")}`;
    }

    function zoneKbById(zoneId) {
      if (!zoneId) return null;
      return KB.zones?.[zoneId] || null;
    }

    function classRefByNode(node) {
      if (!node) return null;
      // Слой Discovery+Inventory на схеме = зона z-disc в справочнике (отдельного класса «Discovery» в CSV нет)
      if (node.id === "n-d1") {
        const z = zoneKbById("z-disc");
        if (z) {
          return {
            key: "Discovery / Inventory",
            data: { what: z.what, techGoal: z.techGoal, businessGoal: z.businessGoal, howWorks: z.howWorks }
          };
        }
      }
      const candidates = [node.label];
      const slashParts = node.label.split("/").map(s => s.trim()).filter(Boolean);
      candidates.push(...slashParts);
      candidates.push(node.label.replace(/\n/g, " ").trim());
      const ref = KB.classReference || {};
      for (const key of Object.keys(ref)) {
        const nk = nrm(key);
        for (const c of candidates) {
          const nc = nrm(c);
          if (!nc) continue;
          if (nk === nc || nk.includes(nc) || nc.includes(nk)) return { key, data: ref[key] };
        }
      }
      return null;
    }

    function classSheetByNode(node) {
      if (!node) return null;
      const sheets = KB.classSheets || {};
      const flat = nrm(node.label.replace(/\n/g, " "));
      // Лист в материалах — «дискаверинг» (кириллица); не путать с листом Inventory (CMDB-реестр)
      const isDiscoveryInventoryLayer =
        node.id === "n-d1" ||
        (flat.includes("discovery") && flat.includes("inventory") && !flat.includes("cloud"));
      if (isDiscoveryInventoryLayer && sheets["дискаверинг"]) {
        return { key: "дискаверинг", data: sheets["дискаверинг"] };
      }
      const candidates = [
        node.label,
        ...node.label.split("/").map(s => s.trim()),
        node.label.replace(/\n/g, " ").trim()
      ].filter(Boolean);
      for (const key of Object.keys(sheets)) {
        const nk = nrm(key);
        for (const c of candidates) {
          const nc = nrm(c);
          if (nk === nc || nk.includes(nc) || nc.includes(nk)) return { key, data: sheets[key] };
        }
      }
      return null;
    }

    function scoreSearchItem(item, tokens) {
      const hay = normalizeForMatch(`${item.title} ${item.body}`);
      const ht = normalizeForMatch(item.title);
      const hayWords = hay.split(" ").filter(Boolean);
      let score = 0;
      for (const t of tokens) {
        if (!t || t.length < 2) continue;
        if (hay.includes(t)) score += ht.includes(t) ? 7 : 3;
        const st = stemToken(t);
        if (st.length >= 3 && hay.includes(st)) score += 2;
      }
      for (const t of tokens) {
        const st = stemToken(t);
        if (st.length < 3) continue;
        for (const w of hayWords) {
          if (stemToken(w) === st) { score += 2; break; }
        }
      }
      return score;
    }

    function runSearch(query) {
      const rawToks = tokenizeQuery(query);
      if (!rawToks.length) {
        sidebarSearchResults.innerHTML = "";
        return;

      const tokens = expandQueryTokens(rawToks);
      const results = searchIndexItems()
        .map((item) => ({ ...item, score: scoreSearchItem(item, tokens) }))
        .filter((r) => r.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 15);

      if (!results.length) {
        sidebarSearchResults.innerHTML = `<div class="muted-text">Ничего не найдено. Попробуйте другое слово или тему из смежного блока тезауруса.</div>`;
        return;

      sidebarSearchResults.innerHTML = `

    }

    function nodeById(id) { return state.nodes.find(n => n.id === id); }
    function zoneById(id) { return state.zones.find(z => z.id === id); }
    function edgeById(id) { return state.edges.find(e => e.id === id); }

    function nodeRect(n) {
      if (n.hub) return { x: n.x, y: n.y, w: 120, h: 120 };
      const w = Math.max(110, Math.min(240, n.label.length * 6.4 + 16));
      const h = 28;
      return { x: n.x, y: n.y, w, h };
    }
    function anchorCenter(entity, isZone=false) {
      if (isZone) return { x: entity.x + entity.w / 2, y: entity.y + entity.h / 2 };
      const r = nodeRect(entity);
      return { x: r.x + r.w / 2, y: r.y + r.h / 2 };
    }
    function rectForEntity(entity, isZone=false) {
      if (isZone) return { x: entity.x, y: entity.y, w: entity.w, h: entity.h, type: "rect" };
      if (entity.hub) {
        return { x: entity.x, y: entity.y, w: 120, h: 120, type: "circle" };
      }
      const r = nodeRect(entity);
      return { x: r.x, y: r.y, w: r.w, h: r.h, type: "rect" };
    }
    function borderPointTowards(rectLike, target) {
      const cx = rectLike.x + rectLike.w / 2;
      const cy = rectLike.y + rectLike.h / 2;
      const dx = target.x - cx;
      const dy = target.y - cy;
      if (Math.abs(dx) < 0.001 && Math.abs(dy) < 0.001) return { x: cx, y: cy };

      if (rectLike.type === "circle") {
        const r = rectLike.w / 2;
        const len = Math.hypot(dx, dy);
        return { x: cx + (dx / len) * r, y: cy + (dy / len) * r };
      }

      const hw = rectLike.w / 2;
      const hh = rectLike.h / 2;
      const tx = hw / Math.abs(dx || 1e-9);
      const ty = hh / Math.abs(dy || 1e-9);
      const t = Math.min(tx, ty);
      return { x: cx + dx * t, y: cy + dy * t };
    }
    function edgeEndpoints(e) {
      const fromZone = e.from.startsWith("z-");
      const toZone = e.to.startsWith("z-");
      const fromObj = fromZone ? zoneById(e.from) : nodeById(e.from);
      const toObj = toZone ? zoneById(e.to) : nodeById(e.to);
      if (!fromObj || !toObj) return null;
      const aCenter = anchorCenter(fromObj, fromZone);
      const bCenter = anchorCenter(toObj, toZone);
      const aRect = rectForEntity(fromObj, fromZone);
      const bRect = rectForEntity(toObj, toZone);
      const start = borderPointTowards(aRect, bCenter);
      const end = borderPointTowards(bRect, aCenter);
      return { sx: start.x, sy: start.y, tx: end.x, ty: end.y };
    }

    function simplifyRoutes(mode = "normal") {
      // Группируем связи по направлению, чтобы разводить параллельные линии.
      const groups = new Map();
      state.edges.forEach((e) => {
        const key = `${e.from}__${e.to}__${e.type}`;
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(e);
      });

      state.edges.forEach((e) => {
        const ep = edgeEndpoints(e);
        if (!ep) return;
        const mx = (ep.sx + ep.tx) / 2;
        const my = (ep.sy + ep.ty) / 2;
        const dx = ep.tx - ep.sx;
        const dy = ep.ty - ep.sy;
        const len = Math.max(1, Math.hypot(dx, dy));
        const nx = -dy / len;
        const ny = dx / len;

        const baseCurve =
          mode === "minCross"
            ? (e.type === "zone" ? 220 : e.type === "alt" ? 140 : 88)
            : (e.type === "zone" ? 120 : e.type === "alt" ? 80 : 52);

        // Разводка параллельных связей.
        const key = `${e.from}__${e.to}__${e.type}`;
        const arr = groups.get(key) || [e];
        const idx = arr.indexOf(e);
        const spread = (idx - (arr.length - 1) / 2) * (mode === "minCross" ? 72 : 34);

        // Связи из/в HUB делаем мягче и короче по изгибу, чтобы убрать «паутину».
        const hubFactor = (e.from === "n-hub" || e.to === "n-hub")
          ? (mode === "minCross" ? 0.95 : 0.72)
          : 1;

        // Длинные диагонали сильнее выносим дугой.
        const longFactor = mode === "minCross"
          ? (len > 1100 ? 1.55 : len > 800 ? 1.4 : len > 550 ? 1.2 : 1.0)
          : (len > 700 ? 1.25 : len > 450 ? 1.1 : 1.0);

        const curve = baseCurve * hubFactor * longFactor + spread;
        e.c = {
          x: mx + nx * curve,
          y: my + ny * curve
        };
      });
    }
    function zoneContainsNode(zone, node) {
      const c = anchorCenter(node, false);
      return c.x >= zone.x && c.x <= zone.x + zone.w && c.y >= zone.y && c.y <= zone.y + zone.h;
    }

          <path d="M0,0 L9,3 L0,6 z" fill="#475569"></path>
        </marker>
        <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
          <path d="M0,0 L9,3 L0,6 z" fill="#16a34a"></path>
        </marker>
      `;
      edgesSvg.appendChild(defs);

      // zones
      state.zones.forEach(z => {
        const el = document.createElement("div");
        el.className = "zone";
        el.dataset.zoneId = z.id;
        el.style.left = z.x + "px"; el.style.top = z.y + "px";
        el.style.width = z.w + "px"; el.style.height = z.h + "px";
        el.style.borderColor = z.color;
        el.style.background = z.color + "20";
        const header = document.createElement("div");
        header.className = "zone-header";
        header.textContent = z.title;
        el.appendChild(header);
        if (editMode) {
          const rh = document.createElement("div");
          rh.className = "zone-resize";
          rh.dataset.zoneId = z.id;
          el.appendChild(rh);
        }
        workspace.appendChild(el);
      });

      workspace.appendChild(edgesSvg);

      // nodes
      state.nodes.forEach(n => {
        const el = document.createElement("div");
        el.className = "node" + (n.hub ? " hub" : "");
        el.dataset.nodeId = n.id;
        el.style.left = n.x + "px"; el.style.top = n.y + "px";
        const r = nodeRect(n);
        if (!n.hub) el.style.width = r.w + "px";
        el.textContent = n.label;
        workspace.appendChild(el);
      });

      // edges
      state.edges.forEach(e => drawEdge(e));

      bindInteractions();
      applySelection();
    }

    function drawEdge(e) {
      const ep = edgeEndpoints(e);
      if (!ep) return;
      if (!e.c) e.c = { x: (ep.sx + ep.tx) / 2, y: (ep.sy + ep.ty) / 2 - 40 };
      const d = `M ${ep.sx} ${ep.sy} Q ${e.c.x} ${e.c.y} ${ep.tx} ${ep.ty}`;

      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      g.dataset.edgeId = e.id;

      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", d);
      path.setAttribute("class", `edge-path ${e.type === "direct" ? "edge-direct" : e.type === "alt" ? "edge-alt" : "edge-zone"}`);
      path.setAttribute("marker-end", e.type === "direct" ? "url(#arrow-dark)" : e.type === "alt" ? "url(#arrow-gray)" : "url(#arrow-green)");
      g.appendChild(path);

      const hit = document.createElementNS("http://www.w3.org/2000/svg", "path");
      hit.setAttribute("d", d);
      hit.setAttribute("class", "edge-hit");
      g.appendChild(hit);

      if (e.label) {
        const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.setAttribute("class", "edge-label");
        const mx = 0.25 * ep.sx + 0.5 * e.c.x + 0.25 * ep.tx;
        const my = 0.25 * ep.sy + 0.5 * e.c.y + 0.25 * ep.ty - 6;
        t.setAttribute("x", mx);
        t.setAttribute("y", my);
        t.textContent = e.label;
        g.appendChild(t);
      }

      if (editMode && selectedEdgeId === e.id) {
        const cp = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        cp.setAttribute("class", "control-point");
        cp.setAttribute("r", "7");
        cp.setAttribute("cx", e.c.x);
        cp.setAttribute("cy", e.c.y);
        cp.dataset.edgeId = e.id;
        g.appendChild(cp);
      }
      edgesSvg.appendChild(g);
    }

    function setEditMode(on) {
      editMode = on;
      editToggle.textContent = on ? "Редактировать: вкл" : "Редактировать: выкл";
      editToggle.classList.toggle("active", on);
      render();
    }

    function selectEdge(edgeId) {
      classDetailExpanded = false;
      selectedEdgeId = edgeId;
      selectedNodeId = null;
      selectedZoneId = null;
      syncPromptSuppressionForNewSelection();
      render();
      updateDetailPrompt();
    }

    function selectNode(nodeId) {
      if (selectedNodeId !== nodeId) classDetailExpanded = false;
      selectedNodeId = nodeId;
      selectedEdgeId = null;
      selectedZoneId = null;
      syncPromptSuppressionForNewSelection();
      render();
      updateDetailPrompt();
    }

    function selectZone(zoneId) {
      classDetailExpanded = false;
      selectedZoneId = zoneId;
      selectedNodeId = null;
      selectedEdgeId = null;
      syncPromptSuppressionForNewSelection();
      render();
      updateDetailPrompt();
    }

    function applySelection() {
      Array.from(workspace.querySelectorAll(".zone,.node")).forEach(el => el.classList.remove("muted","selected"));
      Array.from(edgesSvg.querySelectorAll(".edge-path,.edge-label")).forEach(el => el.classList.remove("muted","edge-active"));
      if (!selectedEdgeId && !selectedNodeId && !selectedZoneId) return;

      // mute all
      Array.from(workspace.querySelectorAll(".zone,.node")).forEach(el => el.classList.add("muted"));
      Array.from(edgesSvg.querySelectorAll(".edge-path,.edge-label")).forEach(el => el.classList.add("muted"));

      if (selectedEdgeId) {
        const e = edgeById(selectedEdgeId);
        if (!e) return;
        const eg = edgesSvg.querySelector(`g[data-edge-id="${selectedEdgeId}"]`);
        if (eg) {
          const path = eg.querySelector(".edge-path");
          const label = eg.querySelector(".edge-label");
          if (path) { path.classList.remove("muted"); path.classList.add("edge-active"); }
          if (label) label.classList.remove("muted");
        }
        const fromZone = e.from.startsWith("z-");
        const toZone = e.to.startsWith("z-");
        const fromNode = fromZone ? null : nodeById(e.from);
        const toNode = toZone ? null : nodeById(e.to);
        const fromZ = fromZone ? zoneById(e.from) : (fromNode?.zoneId ? zoneById(fromNode.zoneId) : null);
        const toZ = toZone ? zoneById(e.to) : (toNode?.zoneId ? zoneById(toNode.zoneId) : null);
        if (fromNode) {
          const el = workspace.querySelector(`.node[data-node-id="${fromNode.id}"]`);
          if (el) { el.classList.remove("muted"); el.classList.add("selected"); }
        }
        if (toNode) {
          const el = workspace.querySelector(`.node[data-node-id="${toNode.id}"]`);
          if (el) { el.classList.remove("muted"); el.classList.add("selected"); }
        }
        if (fromZ) {
          const el = workspace.querySelector(`.zone[data-zone-id="${fromZ.id}"]`);
          if (el) { el.classList.remove("muted"); el.classList.add("selected"); }
        }
        if (toZ) {
          const el = workspace.querySelector(`.zone[data-zone-id="${toZ.id}"]`);
          if (el) { el.classList.remove("muted"); el.classList.add("selected"); }
        }
      }

      if (selectedNodeId) {
        const n = nodeById(selectedNodeId);
        if (!n) return;
        const nodeEl = workspace.querySelector(`.node[data-node-id="${n.id}"]`);
        if (nodeEl) { nodeEl.classList.remove("muted"); nodeEl.classList.add("selected"); }
        if (n.zoneId) {
          const zEl = workspace.querySelector(`.zone[data-zone-id="${n.zoneId}"]`);
          if (zEl) { zEl.classList.remove("muted"); zEl.classList.add("selected"); }
        }
        state.edges.forEach((e) => {
          if (e.from !== n.id && e.to !== n.id) return;
          const eg = edgesSvg.querySelector(`g[data-edge-id="${e.id}"]`);
          if (!eg) return;
          const p = eg.querySelector(".edge-path");
          const l = eg.querySelector(".edge-label");
          if (p) { p.classList.remove("muted"); p.classList.add("edge-active"); }
          if (l) l.classList.remove("muted");
          const otherId = e.from === n.id ? e.to : e.from;
          if (otherId.startsWith("n-")) {
            const oNode = nodeById(otherId);
            if (oNode) {
              const oEl = workspace.querySelector(`.node[data-node-id="${oNode.id}"]`);
              if (oEl) { oEl.classList.remove("muted"); oEl.classList.add("selected"); }
              if (oNode.zoneId) {
                const oz = workspace.querySelector(`.zone[data-zone-id="${oNode.zoneId}"]`);
                if (oz) { oz.classList.remove("muted"); oz.classList.add("selected"); }
              }
            }
          } else if (otherId.startsWith("z-")) {
            const oz = workspace.querySelector(`.zone[data-zone-id="${otherId}"]`);
            if (oz) { oz.classList.remove("muted"); oz.classList.add("selected"); }
          }
        });
      }

      if (selectedZoneId) {
        const z = zoneById(selectedZoneId);
        if (!z) return;

        const zEl = workspace.querySelector(`.zone[data-zone-id="${z.id}"]`);
        if (zEl) { zEl.classList.remove("muted"); zEl.classList.add("selected"); }

        const zoneNodeIds = state.nodes.filter(n => n.zoneId === z.id).map(n => n.id);
        zoneNodeIds.forEach((nid) => {
          const nEl = workspace.querySelector(`.node[data-node-id="${nid}"]`);
          if (nEl) { nEl.classList.remove("muted"); nEl.classList.add("selected"); }
        });

        state.edges.forEach((e) => {
          const fromInZone = e.from === z.id || zoneNodeIds.includes(e.from);
          const toInZone = e.to === z.id || zoneNodeIds.includes(e.to);
          if (!fromInZone && !toInZone) return;
          const eg = edgesSvg.querySelector(`g[data-edge-id="${e.id}"]`);
          if (!eg) return;
          const p = eg.querySelector(".edge-path");
          const l = eg.querySelector(".edge-label");
          if (p) { p.classList.remove("muted"); p.classList.add("edge-active"); }
          if (l) l.classList.remove("muted");

          const other = fromInZone ? e.to : e.from;
          if (other.startsWith("n-")) {
            const oNode = nodeById(other);
            if (oNode) {
              const oEl = workspace.querySelector(`.node[data-node-id="${oNode.id}"]`);
              if (oEl) { oEl.classList.remove("muted"); oEl.classList.add("selected"); }
              if (oNode.zoneId) {
                const oz = workspace.querySelector(`.zone[data-zone-id="${oNode.zoneId}"]`);
                if (oz) { oz.classList.remove("muted"); oz.classList.add("selected"); }
              }
            }
          } else if (other.startsWith("z-")) {
            const oz = workspace.querySelector(`.zone[data-zone-id="${other}"]`);
            if (oz) { oz.classList.remove("muted"); oz.classList.add("selected"); }
          }
        });
      }
    }

    function bindInteractions() {
      // edge click
      Array.from(edgesSvg.querySelectorAll("g[data-edge-id] .edge-hit, g[data-edge-id] .edge-path")).forEach(el => {
        el.addEventListener("click", (e) => {
          const edgeId = e.target.closest("g[data-edge-id]")?.dataset.edgeId;
          if (edgeId) selectEdge(edgeId);
          e.stopPropagation();
        });
      });

      // workspace click clear
      workspace.onclick = (e) => {
        if (e.target === workspace || e.target === edgesSvg || e.target === viewport) {
          classDetailExpanded = false;
          selectedEdgeId = null;
          selectedNodeId = null;
          selectedZoneId = null;
          detailDismissedToken = "";
          promptSuppressedForToken = "";
          render();
          if (knowledgeOpen) renderEntityCard();
          updateDetailPrompt();
        }
      };

      // zone click highlight
      Array.from(workspace.querySelectorAll(".zone")).forEach((zEl) => {
        zEl.onclick = (ev) => {
          if (ev.target.classList.contains("zone-resize")) return;
          const zid = zEl.dataset.zoneId;
          if (!zid) return;
          selectZone(zid);
          ev.stopPropagation();
        };
      });

      // node click highlight (доступно всегда, не только в edit mode)
      Array.from(workspace.querySelectorAll(".node")).forEach((nEl) => {
        nEl.onclick = (ev) => {
          const nid = nEl.dataset.nodeId;
          if (!nid) return;
          if (createEdgeMode && editMode) {
            if (!edgeFrom) {
              edgeFrom = nid;
              nEl.classList.add("selected");
            } else {
              const id = "e" + (Date.now());
              state.edges.push({ id, from: edgeFrom, to: nid, label: "", type: "direct", c: null });
              createEdgeMode = false;
              edgeFrom = null;
              addEdgeBtn.classList.remove("active");
              render();
              updateDetailPrompt();
            }
            ev.stopPropagation();
            return;
          }
          selectNode(nid);
          ev.stopPropagation();
        };
      });

      // drag zones & nodes
      if (editMode) {
        enableDragZones();
        enableResizeZones();
        enableDragNodes();
        enableDragControlPoint();
      }
    }

    function enableDragZones() {
      workspace.querySelectorAll(".zone").forEach(zEl => {
        const zId = zEl.dataset.zoneId;
        zEl.onmousedown = (ev) => {
          if (!editMode || ev.button !== 0) return;
          ev.preventDefault();
          const z = zoneById(zId);
          const sx = ev.clientX, sy = ev.clientY;
          const ox = z.x, oy = z.y;
          const inside = state.nodes.filter(n => n.zoneId === zId).map(n => ({ id: n.id, x: n.x, y: n.y }));
          const mm = (e) => {
            const dx = (e.clientX - sx) / scale;
            const dy = (e.clientY - sy) / scale;
            z.x = ox + dx; z.y = oy + dy;
            inside.forEach(item => {
              const n = nodeById(item.id);
              n.x = item.x + dx; n.y = item.y + dy;
            });
            render();
          };
          const mu = () => { window.removeEventListener("mousemove", mm); window.removeEventListener("mouseup", mu); };
          window.addEventListener("mousemove", mm);
          window.addEventListener("mouseup", mu);
        };
      });
    }

    function enableResizeZones() {
      workspace.querySelectorAll(".zone-resize").forEach((h) => {
        const zId = h.dataset.zoneId;
        h.onmousedown = (ev) => {
          if (!editMode || ev.button !== 0) return;
          ev.preventDefault();
          ev.stopPropagation();
          const z = zoneById(zId);
          const sx = ev.clientX, sy = ev.clientY;
          const ow = z.w, oh = z.h;
          const minW = 260, minH = 140;
          const mm = (e) => {
            const dx = (e.clientX - sx) / scale;
            const dy = (e.clientY - sy) / scale;
            z.w = Math.max(minW, ow + dx);
            z.h = Math.max(minH, oh + dy);
            render();
          };
          const mu = () => {
            window.removeEventListener("mousemove", mm);
            window.removeEventListener("mouseup", mu);
          };
          window.addEventListener("mousemove", mm);
          window.addEventListener("mouseup", mu);
        };
      });
    }

    function enableDragNodes() {
      workspace.querySelectorAll(".node").forEach(nEl => {
        const nId = nEl.dataset.nodeId;
        nEl.onmousedown = (ev) => {
          if (!editMode || ev.button !== 0) return;
          ev.preventDefault();
          const n = nodeById(nId);
          const sx = ev.clientX, sy = ev.clientY;
          const ox = n.x, oy = n.y;
          const mm = (e) => {
            const dx = (e.clientX - sx) / scale;
            const dy = (e.clientY - sy) / scale;
            n.x = ox + dx; n.y = oy + dy;
            render();
          };
          const mu = () => { window.removeEventListener("mousemove", mm); window.removeEventListener("mouseup", mu); };
          window.addEventListener("mousemove", mm);
          window.addEventListener("mouseup", mu);
        };
      });
    }

    function enableDragControlPoint() {
      edgesSvg.querySelectorAll(".control-point").forEach(cp => {
        cp.onmousedown = (ev) => {
          if (!editMode || ev.button !== 0) return;
          ev.preventDefault();
          ev.stopPropagation();
          const edge = edgeById(cp.dataset.edgeId);
          const sx = ev.clientX, sy = ev.clientY;
          const ox = edge.c.x, oy = edge.c.y;
          const mm = (e) => {
            const dx = (e.clientX - sx) / scale;
            const dy = (e.clientY - sy) / scale;
            edge.c.x = ox + dx; edge.c.y = oy + dy;
            render();
          };
          const mu = () => { window.removeEventListener("mousemove", mm); window.removeEventListener("mouseup", mu); };
          window.addEventListener("mousemove", mm);
          window.addEventListener("mouseup", mu);
        };
      });
    }

    // toolbar
    editToggle.onclick = () => setEditMode(!editMode);
    addZoneBtn.onclick = () => {
      if (!editMode) return alert("Сначала включите режим Редактировать.");
      const title = prompt("Название зоны:");
      if (!title) return;
      const id = "z-" + Date.now();
      state.zones.push({ id, title, x: 300, y: 300, w: 420, h: 220, color: "#0ea5e9" });
      render();
    };
    addClassBtn.onclick = () => {
      if (!editMode) return alert("Сначала включите режим Редактировать.");
      const label = prompt("Название класса:");
      if (!label) return;
      const zoneId = prompt("ID зоны (например z-itsm), пусто = без зоны:");
      const id = "n-" + Date.now();
      state.nodes.push({ id, label, x: 500, y: 500, zoneId: zoneId || null, hub: false });
      render();
    };
    addEdgeBtn.onclick = () => {
      if (!editMode) return alert("Сначала включите режим Редактировать.");
      createEdgeMode = !createEdgeMode;
      edgeFrom = null;
      addEdgeBtn.classList.toggle("active", createEdgeMode);
      if (createEdgeMode) alert("Режим + Связь: кликните сначала по узлу-источнику, затем по узлу-получателю.");
      render();
    };
    fitBtn.onclick = () => {
      scale = Math.min(viewport.clientWidth / workspace.clientWidth, viewport.clientHeight / workspace.clientHeight);
      workspace.style.transform = `scale(${scale})`;
      viewport.scrollLeft = 0; viewport.scrollTop = 0;
    };
    resetBtn.onclick = () => {
      scale = 1;
      workspace.style.transform = "scale(1)";
      viewport.scrollLeft = 0; viewport.scrollTop = 0;
    };
    exportBtn.onclick = () => {
      const out = JSON.stringify(state, null, 2);
      navigator.clipboard.writeText(out).then(() => alert("JSON скопирован в буфер обмена."));
    };
    layoutBtn.onclick = () => {
      workspace.style.width = "2600px";
      workspace.style.height = "1600px";
      applyCleanLayout();
      simplifyRoutes("normal");
      render();
    };
    untangleBtn.onclick = () => {
      simplifyRoutes("normal");
      render();
    };
    minCrossBtn.onclick = () => {
      applyMinCrossLayout();
      simplifyRoutes("minCross");
      render();
      scale = 0.56;
      workspace.style.transform = `scale(${scale})`;
      viewport.scrollLeft = 0;
      viewport.scrollTop = 0;
    };

    viewport.addEventListener("wheel", (e) => {
      if (!e.ctrlKey) return;
      e.preventDefault();
      const next = scale + (e.deltaY < 0 ? 0.08 : -0.08);
      scale = Math.max(0.35, Math.min(2.5, next));
      workspace.style.transform = `scale(${scale})`;
    }, { passive: false });

    applyCleanLayout();
    simplifyRoutes("normal");
    renderVendorStub();
    renderEntityCard();
    sidebarSearchInput.addEventListener("input", (e) => runSearch(e.target.value));
    document.querySelector(".knowledge-modal-body").addEventListener("click", (e) => {
      const btn = e.target.closest("[data-action=\"toggle-class-detail\"]");
      if (btn) {
        classDetailExpanded = !classDetailExpanded;
        renderEntityCard();
      }
    });
    toggleSidebarBtn.addEventListener("click", () => {
      sidebarCollapsed = !sidebarCollapsed;
      sidebar.classList.toggle("collapsed", sidebarCollapsed);
      toggleSidebarBtn.textContent = sidebarCollapsed ? "⟩" : "⟨";
      toggleSidebarBtn.title = sidebarCollapsed ? "Развернуть меню" : "Свернуть меню";
    });
    openKnowledgeBtn.addEventListener("click", () => openKnowledgeModal({ fromMenu: true }));
    openKnowledgeFab.addEventListener("click", () => openKnowledgeModal({ fromMenu: true }));
    detailYes.addEventListener("click", (ev) => {
      ev.stopPropagation();
      const tok = selectionDetailToken();
      if (!tok) return;
      promptSuppressedForToken = tok;
      openKnowledgeModal({ focusSearch: false });
    });
    detailNo.addEventListener("click", (ev) => {
      ev.stopPropagation();
      detailDismissedToken = selectionDetailToken();
      updateDetailPrompt();
    });
    closeKnowledgeBtn.addEventListener("click", closeKnowledgeModal);
    knowledgeBackdrop.addEventListener("click", closeKnowledgeModal);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && knowledgeOpen) closeKnowledgeModal();
    });
    render();
  </script>
</body>
</html>
